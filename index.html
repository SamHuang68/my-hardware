<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Professional Hardware Showcase for Sam Huang's Computing Assets">
    <title>Sam Huang | Hardware Showcase</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #05070a;
            --card-bg: rgba(13, 17, 23, 0.7);
            --accent-primary: #00ffcc;
            --accent-secondary: #00d2ff;
            --text-main: #e6edf3;
            --text-dim: #8b949e;
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
            --font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --sidebar-width: 250px;
        }

        /* 啟用平滑滾動 */
        html { scroll-behavior: smooth; }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-family);
            line-height: 1.6;
            overflow-x: hidden;
            display: flex; 
        }

        /* 科技感幾何線條背景 - 提升明顯度 */
        .tech-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: 
                /* 透明度從 0.03 提升至 0.08 讓網格更明顯 */
                linear-gradient(rgba(0, 255, 204, 0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 204, 0.08) 1px, transparent 1px);
            background-size: 50px 50px;
            /* 擴大網格中心可見範圍 (40% -> 55%) */
            mask-image: radial-gradient(circle at center, black 55%, transparent 100%);
            -webkit-mask-image: radial-gradient(circle at center, black 55%, transparent 100%);
            z-index: -1; pointer-events: none;
        }

        /* 左側固定側邊欄 */
        .sidebar {
            position: fixed;
            top: 0; left: 0;
            width: var(--sidebar-width);
            height: 100vh;
            background: rgba(5, 7, 10, 0.95);
            backdrop-filter: blur(10px);
            border-right: 1px solid var(--glass-border);
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 100;
        }

        .sidebar .brand {
            font-size: 1.2rem;
            font-weight: 800;
            color: #fff;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--glass-border);
            letter-spacing: 1px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sidebar a {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.95rem;
            padding: 12px 16px;
            border-radius: 8px;
            transition: all 0.3s ease;
            font-weight: 600;
            border-left: 3px solid transparent;
        }

        .sidebar a:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
        }

        .sidebar a.active {
            background: rgba(0, 255, 204, 0.1);
            color: var(--accent-primary);
            border-left: 3px solid var(--accent-primary);
        }

        /* 右側主要內容區 */
        .app-container {
            margin-left: var(--sidebar-width);
            width: calc(100% - var(--sidebar-width));
            max-width: 1400px;
            padding: 3rem 4rem;
        }

        header {
            text-align: left; 
            margin-bottom: 4rem;
            padding-top: 1rem;
        }

        header h1 {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        header p {
            color: var(--text-dim);
            font-size: 1.1rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Sections */
        section {
            margin-bottom: 5rem;
            scroll-margin-top: 50px; 
        }

        section h2 {
            font-size: 1.8rem;
            margin-bottom: 2rem;
            position: relative;
            padding-left: 1rem;
            display: flex;
            align-items: center;
        }

        section h2::before {
            content: '';
            position: absolute;
            left: 0;
            height: 100%;
            width: 4px;
            background: var(--accent-primary);
            border-radius: 2px;
        }

        /* Grid System */
        .hardware-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 2rem;
        }

        /* Premium Card Design */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 1.5rem;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            animation: fadeInUp 0.6s ease forwards;
            opacity: 0;
        }

        /* 光暈 Highlight 強化 */
        .card:hover {
            transform: translateY(-10px);
            /* 邊框亮度大幅提升 */
            border-color: rgba(0, 255, 204, 0.8);
            /* 多層陰影：底部實體陰影加深 + 更廣泛的外部青色光暈 + 內部青色光暈 */
            box-shadow: 
                0 20px 40px rgba(0, 0, 0, 0.7), 
                0 0 35px rgba(0, 255, 204, 0.35),
                inset 0 0 15px rgba(0, 255, 204, 0.15);
        }

        .card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at top right, rgba(0, 255, 204, 0.05), transparent);
            pointer-events: none;
        }

        .card img {
            width: 100%;
            height: 240px;
            object-fit: contain;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            background: rgba(255, 255, 255, 0.02);
            padding: 1rem;
            transition: transform 0.4s ease;
        }

        .card:hover img {
            transform: scale(1.05);
        }

        .card .badge {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--accent-primary);
            color: var(--accent-primary);
            font-size: 0.7rem;
            font-weight: 700;
            padding: 0.3rem 0.8rem;
            border-radius: 50px;
            text-transform: uppercase;
            z-index: 1;
        }

        .card h3 {
            font-size: 1.4rem;
            margin-bottom: 1rem;
            color: #fff;
        }

        .specs {
            list-style: none;
        }

        .specs li {
            font-size: 0.9rem;
            margin-bottom: 0.6rem;
            display: flex;
            color: var(--text-dim);
        }

        .specs li strong {
            color: var(--text-main);
            width: 80px;
            flex-shrink: 0;
            font-weight: 600;
        }

        /* Footer Section */
        footer {
            text-align: center;
            padding: 4rem 0 2rem 0;
            color: var(--text-dim);
            font-size: 0.9rem;
            border-top: 1px solid var(--glass-border);
        }

        /* Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive Tweak */
        @media (max-width: 900px) {
            body { flex-direction: column; }
            .sidebar { position: relative; width: 100%; height: auto; border-right: none; border-bottom: 1px solid var(--glass-border); padding: 20px; }
            .app-container { margin-left: 0; width: 100%; padding: 2rem; }
            header h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <div class="tech-overlay"></div>

    <nav class="sidebar">
        <div class="brand">SYSTEM.REGISTRY</div>
        <a href="#computing" class="nav-link active">Computing Systems</a>
        <a href="#visual" class="nav-link">Visual Assets</a>
        <a href="#peripherals" class="nav-link">Peripherals & Audio</a>
        <a href="#power" class="nav-link">Power Stations</a>
    </nav>

    <div class="app-container">
        <header>
            <h1>HARDWARE REGISTRY</h1>
            <p>High Performance Asset Database</p>
        </header>

        <section id="computing" class="scroll-section">
            <h2>Computing Systems</h2>
            <div class="hardware-grid" id="systems-grid"></div>
        </section>

        <section id="visual" class="scroll-section">
            <h2>Visual Assets</h2>
            <div class="hardware-grid" id="displays-grid"></div>
        </section>

        <section id="peripherals" class="scroll-section">
            <h2>Peripherals & Audio</h2>
            <div class="hardware-grid" id="peripherals-grid"></div>
        </section>

        <section id="power" class="scroll-section">
            <h2>Power Stations</h2>
            <div class="hardware-grid" id="power-grid"></div>
        </section>

        <footer>
            <p>&copy; 2026 Sam Huang. System Sync Active. Last Updated: <span id="last-updated"></span></p>
        </footer>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            fetch('data.json')
                .then(res => res.json())
                .then(data => {
                    renderApp(data);
                })
                .catch(err => {
                    console.error('Error loading gear list:', err);
                    document.getElementById('systems-grid').innerHTML = '<p style="color: #ff5555;">Failed to load data.json. Ensure files are in the same directory.</p>';
                });

            // 啟動滾動監聽
            initScrollSpy();
        });

        function renderApp(data) {
            const systemsGrid = document.getElementById('systems-grid');
            const displaysGrid = document.getElementById('displays-grid');
            const peripheralsGrid = document.getElementById('peripherals-grid');
            const powerGrid = document.getElementById('power-grid');

            // Systems
            data.hardware_registry.forEach((item, index) => {
                const card = createCard(item, 'System', index);
                systemsGrid.appendChild(card);
            });

            // Displays
            data.display_assets.forEach((item, index) => {
                const card = createCard({
                    ...item,
                    form_factor: 'Display',
                    specs_list: [
                        { label: 'Panel', value: item.panel }
                    ]
                }, 'Display', index);
                displaysGrid.appendChild(card);
            });

            // Peripherals
            data.peripherals.forEach((item, index) => {
                const card = createCard({
                    ...item,
                    form_factor: item.category
                }, 'Peripheral', index);
                peripheralsGrid.appendChild(card);
            });

            // Power
            data.power_assets.forEach((item, index) => {
                const card = createCard({
                    ...item,
                    form_factor: item.category
                }, 'Power', index);
                powerGrid.appendChild(card);
            });

            // Update Footer
            document.getElementById('last-updated').textContent = data.last_updated;
        }

        function createCard(item, type, index) {
            const card = document.createElement('div');
            card.className = 'card';
            card.style.animationDelay = `${index * 0.1}s`;

            const imgPath = item.image_path || 'images/default.png';
            const fallbackSVG = `data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='300' height='200'><rect width='100%' height='100%' fill='%230a0c10'/><text x='50%' y='50%' fill='%23333' dominant-baseline='middle' text-anchor='middle' font-family='sans-serif' font-size='12'>NO IMAGE</text></svg>`;

            let specsHtml = '';

            if (type === 'System') {
                const gpuStr = typeof item.gpu === 'object' ?
                    `${item.gpu.internal} / ${item.gpu.external}` : item.gpu;

                specsHtml = `
                    <ul class="specs">
                        <li><strong>CPU</strong> <span>${item.cpu.model || ''}</span></li>
                        <li><strong>RAM</strong> <span>${item.ram?.capacity || ''} ${item.ram?.spec || ''}</span></li>
                        <li><strong>GPU</strong> <span>${gpuStr}</span></li>
                        <li><strong>DISK</strong> <span>${item.storage?.primary || ''}</span></li>
                        ${item.power_supply ? `<li><strong>PSU</strong> <span>${item.power_supply}</span></li>` : ''}
                        ${item.motherboard ? `<li><strong>MOBO</strong> <span>${item.motherboard}</span></li>` : ''}
                    </ul>
                `;
            } else if (item.specs_list) {
                specsHtml = `<ul class="specs">` +
                    item.specs_list.map(s => `<li><strong>${s.label}</strong> <span>${s.value}</span></li>`).join('') +
                    `</ul>`;
            }

            card.innerHTML = `
                <div class="badge">${item.form_factor || type}</div>
                <img src="${imgPath}" alt="${item.name}" onerror="this.src='${fallbackSVG}'">
                <h3>${item.name}</h3>
                ${specsHtml}
            `;

            return card;
        }

        // 側邊欄自動跟隨滾動進度的邏輯
        function initScrollSpy() {
            const sections = document.querySelectorAll('.scroll-section');
            const navLinks = document.querySelectorAll('.nav-link');

            window.addEventListener('scroll', () => {
                let currentId = '';
                sections.forEach(section => {
                    const sectionTop = section.offsetTop;
                    if (scrollY >= sectionTop - 150) {
                        currentId = section.getAttribute('id');
                    }
                });

                navLinks.forEach(link => {
                    link.classList.remove('active');
                    if (link.getAttribute('href') === `#${currentId}`) {
                        link.classList.add('active');
                    }
                });
            });
        }
    </script>
</body>
</html>
