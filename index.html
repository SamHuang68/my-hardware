<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sam Huang's Hardware Registry</title>
    <style>
        /* 啟用平滑滾動 */
        html { scroll-behavior: smooth; }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #121212; 
            color: #eee; 
            margin: 0; 
            display: flex; /* 使用 flexbox 切分左右版面 */
        }

        /* 左側固定側邊欄 */
        .sidebar {
            position: fixed;
            top: 0; 
            left: 0;
            width: 240px;
            height: 100vh;
            background: #181818;
            border-right: 1px solid #2a2a2a;
            padding: 40px 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 100;
        }

        .sidebar .brand {
            font-size: 1.1em;
            font-weight: bold;
            color: #fff;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 1px solid #333;
            letter-spacing: 1px;
        }

        .sidebar a {
            color: #aaa;
            text-decoration: none;
            font-size: 0.95em;
            padding: 10px 15px;
            border-radius: 6px;
            transition: all 0.2s ease;
        }

        .sidebar a:hover {
            background: #252525;
            color: #fff;
        }
