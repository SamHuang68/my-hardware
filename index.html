<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sam Huang's Hardware Registry - CHROMA TECH</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <style>
        :root {
            /* 時尚科技色譜 */
            --neon-cyan: #00f3ff;
            --neon-purple: #bc13fe;
            --tech-pink: #ff007f;
            --deep-space: #050510; /* 深藍紫底色 */
            --glass-bg: rgba(15, 18, 30, 0.6);
        }

        html, body { 
            margin: 0; padding: 0; height: 100%; 
            font-family: 'Syne', 'Segoe UI', Roboto, Helvetica, sans-serif; /* 使用更具時尚感的字體 */
            color: #fff;
            overflow: hidden; 
            /* 修正：全域底色改為深藍紫漸層，增強深度感 */
            background: radial-gradient(circle at 50% 50%, #1a1a35 0%, var(--deep-space) 100%);
        }

        /* WebGL 背景容器 */
        #webgl-canvas {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -2; pointer-events: none;
        }

        /* 時尚科技背景疊加層 (增加視覺饗宴感) */
        .tech-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1; pointer-events: none;
            /* 幾何線條網格 */
            background-image: 
                linear-gradient(rgba(100, 100, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(100, 100, 255, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            /* 時尚暗角聚焦 */
            background-color: transparent;
            mask-image: radial-gradient(circle at center, black 30%, transparent 100%);
            -webkit-mask-image: radial-gradient(circle at center, black 30%, transparent 100%);
        }

        /* 側邊導覽列 (Sidebar) */
        .sidebar {
            position: fixed; left: 30px; top: 50%; transform: translateY(-50%);
            display: flex; flex-direction: column; gap: 20px; z-index: 10;
        }

        .nav-item {
            width: 14px; height: 14px; border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid transparent; cursor: pointer;
            transition: all 0.5s cubic-bezier(0.22, 1, 0.36, 1);
            position: relative;
        }

        /* 磁吸互動觸發範圍 */
        .nav-item::before {
            content: ''; position: absolute;
            top: -15px; left: -15px; right: -15px; bottom: -15px;
        }

        .nav-item.active {
            background: #fff;
            border-color: var(--neon-cyan);
            box-shadow: 0 0 20px var(--neon-cyan), 0 0 40px var(--neon-purple);
            transform: scale(1.6);
        }

        .nav-tooltip {
            position: absolute; left: 35px; top: 50%; transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(10px);
            padding: 6px 16px; border-radius: 20px; font-size: 0.8em;
            letter-spacing: 2px; text-transform: uppercase; font-weight: bold;
            color: #fff; border: 1px solid rgba(255, 255, 255, 0.1);
            opacity: 0; pointer-events: none; transition: all 0.3s ease;
            white-space: nowrap;
        }
        .nav-item:hover .nav-tooltip { opacity: 1; left: 45px; }

        /* 主視窗滾動區 */
        .scroll-container {
            height: 100vh; width: 100vw; padding-left: 90px; box-sizing: border-box;
            overflow-y: scroll; scroll-snap-type: y mandatory; scroll-behavior: smooth;
        }
        .scroll-container::-webkit-scrollbar { display: none; } 

        .section {
            height: 100vh; scroll-snap-align: start; display: flex; flex-direction: column;
            padding: 60px 50px 60px 20px; box-sizing: border-box; position: relative;
        }

        /* 英雄區塊 */
        .hero-section { justify-content: center; align-items: flex-start; padding-left: 8%; }
        .hero-title {
            font-size: 6vw; font-weight: 900; margin: 0; line-height: 1.0;
            background: linear-gradient(135deg, #fff 30%, var(--neon-cyan) 70%, var(--neon-purple) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-transform: uppercase; letter-spacing: 6px;
            filter: drop-shadow(0 0 30px rgba(0, 243, 255, 0.4));
        }
        .hero-subtitle { font-size: 1.6vw; color: rgba(255, 255, 255, 0.6); margin-top: 15px; letter-spacing: 4px; font-weight: 300; }

        .container { max-width: 1500px; width: 100%; height: 100%; display: flex; flex-direction: column; }
        .section-title {
            font-size: 2.8em; color: #fff; margin-bottom: 35px; padding-bottom: 15px;
            font-weight: 800; text-transform: uppercase; letter-spacing: 4px; position: relative;
        }
        /* 時尚霓虹下劃線 */
        .section-title::after {
            content: ''; position: absolute; left: 0; bottom: -2px;
            width: 120px; height: 3px; 
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-purple));
            box-shadow: 0 0 15px var(--neon-cyan);
            border-radius: 3px;
        }

        .grid-wrapper { flex-grow: 1; overflow-y: auto; padding-right: 20px; padding-bottom: 50px; }
        .grid-wrapper::-webkit-scrollbar { width: 5px; }
        .grid-wrapper::-webkit-scrollbar-track { background: transparent; }
        .grid-wrapper::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 5px; }
        .grid-wrapper:hover::-webkit-scrollbar-thumb { background: rgba(0, 243, 255, 0.3); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 35px; }

        /* 卡片光束動畫 (Border Beam) */
        .card-wrapper {
            position: relative; border-radius: 16px; overflow: hidden;
            background: rgba(255, 255, 255, 0.04); padding: 1px;
            transition: all 0.5s cubic-bezier(0.22, 1, 0.36, 1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        .card-wrapper::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(transparent, transparent, var(--neon-cyan), transparent, var(--neon-purple), transparent);
            animation: borderBeam 6s linear infinite; opacity: 0; transition: opacity 0.4s ease;
        }
        .card-wrapper:hover { transform: translateY(-12px) scale(1.02); z-index: 2; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5); border-color: rgba(255, 255, 255, 0.1); }
        .card-wrapper:hover::before { opacity: 1; }

        @keyframes borderBeam {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 卡片內容 (磨砂玻璃) */
        .card {
            background: var(--glass-bg); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-radius: 15px; padding: 30px; height: 100%; box-sizing: border-box; position: relative; z-index: 1;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .card img { width: 100%; height: 220px; object-fit: contain; margin-bottom: 25px; filter: drop-shadow(0 15px 25px rgba(0,0,0,0.6)); transition: transform 0.6s ease; }
        .card-wrapper:hover img { transform: scale(1.08); }

        .tag {
            display: inline-block; background: rgba(255, 255, 255, 0.05); color: #fff;
            padding: 5px 12px; border-radius: 20px; font-size: 0.7em; font-weight: 700;
            margin-bottom: 18px; border: 1px solid rgba(255, 255, 255, 0.1); letter-spacing: 1.5px; text-transform: uppercase;
        }
        h3 { margin-top: 0; font-size: 1.4em; letter-spacing: 1px; margin-bottom: 18px; font-weight: 700; }
        p { margin: 8px 0; font-size: 0.95em; color: rgba(255, 255, 255, 0.7); line-height: 1.6; }
        .spec-label { color: var(--neon-cyan); font-weight: 700; margin-right: 8px; display: inline-block; min-width: 55px; opacity: 0.9; }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="webgl-canvas"></div>
    <div class="tech-overlay"></div>

    <aside class="sidebar">
        <div class="nav-item magnetic active" data-target="section-hero"><span class="nav-tooltip">Initialization</span></div>
        <div class="nav-item magnetic" data-target="section-systems"><span class="nav-tooltip">Systems</span></div>
        <div class="nav-item magnetic" data-target="section-displays"><span class="nav-tooltip">Displays</span></div>
        <div class="nav-item magnetic" data-target="section-peripherals"><span class="nav-tooltip">Peripherals</span></div>
        <div class="nav-item magnetic" data-target="section-power"><span class="nav-tooltip">Power Grid</span></div>
    </aside>

    <div class="scroll-container" id="main-scroll">
        <section class="section hero-section" id="section-hero">
            <h1 class="hero-title">Registry<br>Hub</h1>
            <p class="hero-subtitle">SYSTEM ARCHITECTURE & HARDWARE ASSETS</p>
            <p style="color: rgba(255,255,255,0.3); margin-top: 40px; letter-spacing: 3px; font-weight: 700;">LAST SYNC: <span id="last-updated" style="color: #fff;"></span></p>
        </section>

        <section class="section" id="section-systems">
            <div class="container">
                <h2 class="section-title">Computing Core</h2>
                <div class="grid-wrapper"><div class="grid" id="systems-grid"></div></div>
            </div>
        </section>

        <section class="section" id="section-displays">
            <div class="container">
                <h2 class="section-title">Visual Terminals</h2>
                <div class="grid-wrapper"><div class="grid" id="displays-grid"></div></div>
            </div>
        </section>

        <section class="section" id="section-peripherals">
            <div class="container">
                <h2 class="section-title">Tactile & Audio</h2>
                <div class="grid-wrapper"><div class="grid" id="peripherals-grid"></div></div>
            </div>
        </section>

        <section class="section" id="section-power">
            <div class="container">
                <h2 class="section-title">Power Delivery</h2>
                <div class="grid-wrapper"><div class="grid" id="power-grid"></div></div>
            </div>
        </section>
    </div>

    <script>
        /* ==========================================
           1. 磁吸效果 (Magnetic Pull)
           ========================================== */
        const magnetics = document.querySelectorAll('.magnetic');
        magnetics.forEach(btn => {
            btn.addEventListener('mousemove', function(e) {
                const rect = btn.getBoundingClientRect();
                const x = e.clientX - rect.left - rect.width / 2;
                const y = e.clientY - rect.top - rect.height / 2;
                btn.style.transform = `translate(${x * 0.45}px, ${y * 0.45}px)`; // 增加一點磁吸幅度
            });
            btn.addEventListener('mouseout', function() {
                btn.style.transform = ''; 
            });
            btn.addEventListener('click', function() {
                const targetId = this.getAttribute('data-target');
                document.getElementById(targetId).scrollIntoView({ behavior: 'smooth' });
            });
        });

        /* ==========================================
           2. 滾動監聽 (更新 Sidebar 狀態)
           ========================================== */
        const sections = document.querySelectorAll('.section');
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if(entry.isIntersecting) {
                    document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
                    const activeNav = document.querySelector(`.nav-item[data-target="${entry.target.id}"]`);
                    if(activeNav) activeNav.classList.add('active');
                }
            });
        }, { threshold: 0.5 });
        sections.forEach(sec => observer.observe(sec));

        /* ==========================================
           3. Three.js 炫彩霓虹粒子流體 (Chroma Fluid)
           ========================================== */
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 1, 10000); // 調整視角增強拉伸感
        camera.position.z = 1200;
        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio); // 修正：提升高解析度螢幕的畫質
        document.getElementById('webgl-canvas').appendChild(renderer.domElement);

        const particleCount = 3000; // 增加粒子數量
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3); // 新增：粒子色彩屬性
        const scales = new Float32Array(particleCount);

        let i = 0, j = 0, k = 0;
        const amountX = 60, amountY = 50, separation = 110;
        for ( let ix = 0; ix < amountX; ix ++ ) {
            for ( let iy = 0; iy < amountY; iy ++ ) {
                positions[ i ] = ix * separation - ( ( amountX * separation ) / 2 ); // x
                positions[ i + 1 ] = 0; // y
                positions[ i + 2 ] = iy * separation - ( ( amountY * separation ) / 2 ); // z
                
                // 初始化色彩 (預設青色)
                colors[ k ] = 0; // R
                colors[ k + 1 ] = 0.95; // G
                colors[ k + 2 ] = 1; // B

                scales[ j ] = 1;
                i += 3; j ++; k += 3;
            }
        }
        geometry.setAttribute( 'position', new THREE.BufferAttribute( positions, 3 ) );
        geometry.setAttribute( 'color', new THREE.BufferAttribute( colors, 3 ) ); // 啟用頂點色彩
        geometry.setAttribute( 'scale', new THREE.BufferAttribute( scales, 1 ) );

        // 時尚霓虹粒子材質 (ShaderMaterial)
        const material = new THREE.ShaderMaterial({
            uniforms: {
                time: { value: 0 },
                colorCyan: { value: new THREE.Color(0x00f3ff) },
                colorPurple: { value: new THREE.Color(0xbc13fe) }
            },
            vertexShader: `
                uniform float time;
                attribute float scale;
                attribute vec3 color; // 接收自定義色彩
                varying vec3 vColor; // 傳遞給 fragment shader
                varying float vAlpha;

                void main() {
                    vColor = color;
                    vec3 pos = position;
                    // 修正：更複雜的波浪運算，增加層次感
                    pos.y = (sin((pos.x + time * 50.0) * 0.01) * 60.0) +
                            (cos((pos.z + time * 30.0) * 0.01) * 60.0);
                    
                    // 根據 Y 軸高度微調色彩 (青色與紫色漸變)
                    float colorMix = (pos.y + 120.0) / 240.0;
                    vColor = mix(vColor, vec3(0.74, 0.07, 1.0), colorMix); // 漸變到紫色

                    vec4 mvPosition = modelViewMatrix * vec4( pos, 1.0 );
                    // 粒子大小隨距離衰減，並隨時間微微閃爍
                    gl_PointSize = scale * (Separation * 3.5 / - mvPosition.z) * (1.0 + sin(time + pos.x) * 0.1);
                    gl_Position = projectionMatrix * mvPosition;
                    // 深度霧化效果
                    vAlpha = 1.0 - (mvPosition.z + 1000.0) / 2000.0;
                }
            `,
            fragmentShader: `
                varying vec3 vColor;
                varying float vAlpha;
                void main() {
                    // 圓形粒子，帶有柔和邊緣
                    float dist = length( gl_PointCoord - vec2( 0.5, 0.5 ) );
                    if ( dist > 0.5 ) discard;
                    float glow = 1.0 - smoothstep(0.0, 0.5, dist);
                    gl_FragColor = vec4( vColor, vAlpha * glow * 0.7 );
                }
            `,
            transparent: true,
            blending: THREE.AdditiveBlending, // 啟用疊加混合，增強發光感
            depthTest: false // 禁用深度測試，避免近處粒子遮擋遠處粒子的光芒
        });

        const particles = new THREE.Points( geometry, material );
        particles.rotation.x = 0.6; // 調整視角
        scene.add( particles );

        // 滑鼠追蹤互動
        let mouseX = 0, mouseY = 0;
        let targetX = 0, targetY = 0;
        const windowHalfX = window.innerWidth / 2;
        const windowHalfY = window.innerHeight / 2;
        document.addEventListener( 'mousemove', (event) => {
            mouseX = event.clientX - windowHalfX;
            mouseY = event.clientY - windowHalfY;
        });

        let clock = new THREE.Clock(); // 使用 Clock 取得平滑的時間增量
        function animate() {
            requestAnimationFrame( animate );
            
            let delta = clock.getDelta();
            material.uniforms.time.value += delta; // 更新 Shader 時間

            // 鏡頭緩動跟隨滑鼠 (時尚沉浸感運鏡)
            targetX = mouseX * 0.4;
            targetY = mouseY * 0.3;
            camera.position.x += ( targetX - camera.position.x ) * 0.04;
            camera.position.y += ( - targetY - camera.position.y + 350) * 0.04;
            camera.lookAt( scene.position );

            // 修正：將波浪運算移至 Vertex Shader 以提升效能

            renderer.render( scene, camera );
        }
        animate();

        // 視窗縮放適應
        window.addEventListener( 'resize', onWindowResize, false );
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize( window.innerWidth, window.innerHeight );
        }

        /* ==========================================
           4. 載入資料庫 (data.json) 並生成時尚卡片
           ========================================== */
        const fallbackSVG = `data:image/svg+xml;utf8,<svg xmlns=\\'http://www.w3.org/2000/svg\\' width=\\'300\\' height=\\'200\\'><text x=\\'50%\\' y=\\'50%\\' fill=\\'%23555\\' dominant-baseline=\\'middle\\' text-anchor=\\'middle\\' font-family=\\'sans-serif\\' font-size=\\'14\\'>NO SIGNAL</text></svg>`;

        // 封裝卡片產生的邏輯，加上 card-wrapper 達成光束效果
        function createCard(contentHTML) {
            const wrapper = document.createElement('div');
            wrapper.className = 'card-wrapper';
            wrapper.innerHTML = `<div class="card">${contentHTML}</div>`;
            return wrapper;
        }

        fetch('data.json')
            .then(res => res.json())
            .then(data => {
                document.getElementById('last-updated').textContent = data?.last_updated || 'Unknown';

                const sysGrid = document.getElementById('systems-grid');
                data?.hardware_registry?.forEach(sys => {
                    let gpuText = 'N/A';
                    if (sys?.gpu) gpuText = typeof sys.gpu === 'string' ? sys.gpu : (sys.gpu.external || sys.gpu.internal || 'N/A');
                    
                    sysGrid.appendChild(createCard(`
                        <img src="${sys?.image_path || 'images/default.png'}" onerror="this.src='${fallbackSVG}'">
                        <span class="tag">SYS Core</span>
                        <h3>${sys?.name || 'Unknown Device'}</h3>
                        ${sys?.cpu?.model ? `<p><span class="spec-label">CPU</span> ${sys.cpu.model}</p>` : ''}
                        ${sys?.ram?.capacity ? `<p><span class="spec-label">RAM</span> ${sys.ram.capacity} ${sys.ram.spec ? `(${sys.ram.spec})` : ''}</p>` : ''}
                        ${gpuText !== 'N/A' ? `<p><span class="spec-label">GPU</span> ${gpuText}</p>` : ''}
                        ${sys?.storage?.primary ? `<p><span class="spec-label">DISK</span> ${sys.storage.primary}</p>` : ''}
                        ${sys?.power_supply ? `<p><span class="spec-label">PSU</span> ${sys.power_supply}</p>` : ''}
                    `));
                });

                const dispGrid = document.getElementById('displays-grid');
                data?.display_assets?.forEach(disp => {
                    dispGrid.appendChild(createCard(`
                        <img src="${disp?.image_path || 'images/default.png'}" onerror="this.src='${fallbackSVG}'">
                        <span class="tag" style="border-color: rgba(0, 243, 255, 0.2);">Visual</span>
                        <h3>${disp?.name || 'Unknown Display'}</h3>
                        ${disp?.panel ? `<p><span class="spec-label">PANEL</span> ${disp.panel}</p>` : ''}
                    `));
                });

                const periphGrid = document.getElementById('peripherals-grid');
                data?.peripherals?.forEach(p => {
                    periphGrid.appendChild(createCard(`
                        <img src="${p?.image_path || 'images/default.png'}" onerror="this.src='${fallbackSVG}'">
                        <span class="tag" style="border-color: rgba(188, 19, 254, 0.2);">Tactile</span>
                        <h3>${p?.name || 'Unknown Peripheral'}</h3>
                    `));
                });

                const powerGrid = document.getElementById('power-grid');
                data?.power_assets?.forEach(p => {
                    powerGrid.appendChild(createCard(`
                        <img src="${p?.image_path || 'images/default.png'}" onerror="this.src='${fallbackSVG}'">
                        <span class="tag" style="border-color: rgba(255, 0, 127, 0.2);">Energy</span>
                        <h3>${p?.name || 'Unknown Power Device'}</h3>
                    `));
                });
            })
            .catch(err => {
                console.error('Data sync failed:', err);
                document.getElementById('systems-grid').innerHTML = '<p style="color: #ff3333;">[CRITICAL ERROR] DATALINK SEVERED.</p>';
            });
    </script>
</body>
</html>
